<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz Escolar Street</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1 class="titulo">🎮 QUIZ SCHOOL STREET 🎮</h1>

    <div id="quiz-box" class="quiz-box">
      <h2 id="question">Pergunta aqui</h2>

      <div id="answers" class="answers"></div>

      <button id="nextBtn" class="btn">Próxima</button>
    </div>

    <div id="result" class="result hidden">
      <h2>Resultado Final</h2>
      <p id="score"></p>
      <button onclick="location.reload()" class="btn">Jogar de novo</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
