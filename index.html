<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Street Arcade Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bg"></canvas>

<div class="ui">

  <h1 class="logo">STREET ARCADE QUIZ</h1>

  <div id="menu" class="panel">
    <input id="name" placeholder="Seu nome street..." />
    
    <select id="level">
      <option value="easy">Fácil</option>
      <option value="medium">Médio</option>
      <option value="hard">Difícil</option>
    </select>

    <button onclick="start()" class="btn">START</button>

    <div class="ranking">
      <h3>🏆 TOP STREET</h3>
      <div id="rank"></div>
    </div>
  </div>

  <div id="game" class="panel hidden">

    <div class="hud">
      <span id="player"></span>
      <span>Score: <b id="score">0</b></span>
      <span>Combo: <b id="combo">x0</b></span>
    </div>

    <h2 id="question"></h2>

    <div id="answers"></div>

    <button id="next" class="btn hidden">NEXT</button>
  </div>

  <div id="end" class="panel hidden">
    <h1>GAME OVER</h1>
    <p id="final"></p>
    <button onclick="location.reload()" class="btn">RETRY</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
